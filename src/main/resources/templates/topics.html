<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Topics</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f8fb; }
        .card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #e7e7e7; text-align: left; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 18px; }
        a.button { background: #111827; color: white; padding: 10px 14px; border-radius: 10px; text-decoration: none; }
    </style>
</head>
<body>
<div class="toolbar">
    <a class="button" th:href="@{/manage/topics/new}">Create Topic</a>
</div>

<div class="card">
    <h1>Topics</h1>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Description</th>
            <th>Search Query</th>
            <th>Articles</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="topic : ${topics}">
            <td th:text="${topic.id}">1</td>
            <td><a th:href="@{/manage/topics/{id}(id=${topic.id})}" th:text="${topic.name}">Machine Learning</a></td>
            <td th:text="${topic.description}">Research topic</td>
            <td th:text="${topic.searchQuery}">machine learning</td>
            <td th:text="${topic.articleCount}">0</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
