<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ScholarPulse Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f7f8fb; color: #1d1d1f; }
        h1, h2 { margin-bottom: 12px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .card { background: white; border-radius: 14px; padding: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.06); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; border-bottom: 1px solid #e7e7e7; text-align: left; }
        .meta { color: #666; margin-bottom: 24px; }
        .toolbar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
        a.button { background: #111827; color: white; padding: 10px 14px; border-radius: 10px; text-decoration: none; }
        a.secondary { background: #e5e7eb; color: #111827; }
    </style>
</head>
<body>
<h1>ScholarPulse</h1>
<p class="meta">Research topic tracking, article import, and curated collections.</p>

<div class="toolbar">
    <a class="button" th:href="@{/manage/topics/new}">Create Topic</a>
    <a class="button" th:href="@{/manage/collections/new}">Create Collection</a>
    <a class="button secondary" th:href="@{/manage/articles}">Manage Articles</a>
    <a class="button secondary" th:href="@{/swagger-ui/index.html}">Swagger UI</a>
</div>

<div class="grid">
    <div class="card">
        <h2>Topics</h2>
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Search Query</th>
                <th>Articles</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="topic : ${topics}">
                <td><a th:href="@{/manage/topics/{id}(id=${topic.id})}" th:text="${topic.name}">Machine Learning</a></td>
                <td th:text="${topic.searchQuery}">machine learning</td>
                <td th:text="${topic.articleCount}">0</td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="card">
        <h2>Collections</h2>
        <table>
            <thead>
            <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Articles</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="collection : ${collections}">
                <td><a th:href="@{/manage/collections/{id}(id=${collection.id})}" th:text="${collection.name}">Reading List</a></td>
                <td th:text="${collection.description}">Important papers</td>
                <td th:text="${collection.articleCount}">0</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
